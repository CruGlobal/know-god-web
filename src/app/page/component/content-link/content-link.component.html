<ng-container *ngIf="ready && !isHidden">
  <div
    class="linkContent indent"
    [style.visibility]="isInvisible ? 'hidden' : 'visible'"
  >
    <a
      *ngIf="link.url; else linkTemplate"
      [href]="link.url"
      target="_blank"
      rel="noopener noreferrer"
      (click)="onClick()"
      >{{ linkText }}</a
    >
    <ng-template #linkTemplate>
      <button type="button" (click)="onClick()">{{ linkText }}</button>
    </ng-template>
  </div>
</ng-container>
